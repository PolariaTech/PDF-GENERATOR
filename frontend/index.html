<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resumen de Épica · Generador PDF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
      #editor {
        font-family: ui-monospace, "SF Mono", Menlo, monospace;
        font-size: 13px;
        tab-size: 2;
      }
    </style>
  </head>
  <body class="bg-slate-100 text-slate-800 min-h-screen">
    <div class="max-w-6xl mx-auto px-6 py-8">
      <header class="mb-8">
        <p
          class="text-xs font-bold tracking-widest text-slate-400 uppercase mb-1"
        >
          Polaria · Épica Planning
        </p>
        <h1 class="text-2xl font-bold text-slate-900">
          Generador de Resumen de Épica
        </h1>
        <p class="text-sm text-slate-500 mt-1">
          Sube el documento .md del mes, revisa lo que se extrajo y descarga el
          PDF para socios y clientes.
        </p>
      </header>

      <!-- PASO 1: subir -->
      <section
        id="step-upload"
        class="bg-white rounded-2xl border border-slate-200 p-6 mb-6"
      >
        <div class="flex items-center gap-2 mb-4">
          <span
            class="flex items-center justify-center w-6 h-6 rounded-full bg-slate-900 text-white text-xs font-bold"
            >1</span
          >
          <h2 class="font-semibold text-slate-900">Subir documento del mes</h2>
        </div>
        <label
          id="dropzone"
          class="block border-2 border-dashed border-slate-300 rounded-xl p-10 text-center cursor-pointer hover:border-slate-400 hover:bg-slate-50 transition"
        >
          <input type="file" id="file-input" accept=".md" class="hidden" />
          <div class="text-slate-400 text-4xl mb-2">↑</div>
          <p class="text-sm font-medium text-slate-700">
            Haz clic o arrastra el archivo .md aquí
          </p>
          <p id="file-name" class="text-xs text-slate-400 mt-1">
            Ningún archivo seleccionado
          </p>
        </label>
        <button
          id="btn-extraer"
          disabled
          class="mt-4 w-full bg-slate-900 text-white rounded-xl py-3 text-sm font-semibold disabled:opacity-40 disabled:cursor-not-allowed hover:bg-slate-800 transition flex items-center justify-center gap-2"
        >
          <span id="extraer-label">Extraer datos con IA</span>
          <span id="extraer-spinner" class="hidden animate-spin">◠</span>
        </button>
        <p id="upload-error" class="hidden mt-3 text-sm text-red-600"></p>
      </section>

      <!-- Tarjeta de consumo de tokens -->
      <div
        id="token-usage"
        class="hidden mb-6 bg-slate-900 text-slate-100 rounded-xl px-4 py-3 text-sm flex items-center gap-2"
      >
        <span class="text-slate-400">⚡</span>
        <span id="token-usage-text"></span>
      </div>

      <!-- PASO 2: editar -->
      <section
        id="step-edit"
        class="hidden bg-white rounded-2xl border border-slate-200 p-6 mb-6"
      >
        <div class="flex items-center gap-2 mb-4">
          <span
            class="flex items-center justify-center w-6 h-6 rounded-full bg-slate-900 text-white text-xs font-bold"
            >2</span
          >
          <h2 class="font-semibold text-slate-900">Revisar y corregir</h2>
          <span class="text-xs text-slate-400 ml-auto"
            >Edita el JSON si algo quedó mal extraído</span
          >
        </div>
        <textarea
          id="editor"
          rows="20"
          spellcheck="false"
          class="w-full border border-slate-200 rounded-xl p-4 bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-300 resize-y"
        ></textarea>
        <p id="json-error" class="hidden mt-2 text-sm text-red-600"></p>
        <div class="flex gap-3 mt-4">
          <button
            id="btn-preview"
            class="flex-1 bg-white border border-slate-300 text-slate-700 rounded-xl py-3 text-sm font-semibold hover:bg-slate-50 transition"
          >
            Actualizar vista previa
          </button>
          <button
            id="btn-pdf"
            class="flex-1 bg-emerald-600 text-white rounded-xl py-3 text-sm font-semibold hover:bg-emerald-700 transition flex items-center justify-center gap-2"
          >
            <span id="pdf-label">Descargar PDF</span>
            <span id="pdf-spinner" class="hidden animate-spin">◠</span>
          </button>
        </div>
      </section>

      <!-- PASO 3: preview -->
      <section
        id="step-preview"
        class="hidden bg-white rounded-2xl border border-slate-200 p-6"
      >
        <div class="flex items-center gap-2 mb-4">
          <span
            class="flex items-center justify-center w-6 h-6 rounded-full bg-slate-900 text-white text-xs font-bold"
            >3</span
          >
          <h2 class="font-semibold text-slate-900">Vista previa</h2>
        </div>
        <div
          class="rounded-xl overflow-hidden border border-slate-200 bg-slate-50"
        >
          <iframe
            id="preview-frame"
            class="w-full"
            style="height: 760px; border: 0; transform-origin: top left"
          ></iframe>
        </div>
      </section>
    </div>

    <script>
      const API = location.origin;
      let selectedFile = null;

      const fileInput = document.getElementById("file-input");
      const fileName = document.getElementById("file-name");
      const dropzone = document.getElementById("dropzone");
      const btnExtraer = document.getElementById("btn-extraer");
      const uploadError = document.getElementById("upload-error");
      const stepEdit = document.getElementById("step-edit");
      const stepPreview = document.getElementById("step-preview");
      const editor = document.getElementById("editor");
      const jsonError = document.getElementById("json-error");
      const btnPreview = document.getElementById("btn-preview");
      const btnPdf = document.getElementById("btn-pdf");
      const previewFrame = document.getElementById("preview-frame");

      function setFile(file) {
        if (!file) return;
        if (!file.name.toLowerCase().endsWith(".md")) {
          showUploadError("Solo se aceptan archivos .md");
          return;
        }
        selectedFile = file;
        fileName.textContent = file.name;
        btnExtraer.disabled = false;
        hideUploadError();
      }

      function showUploadError(msg) {
        uploadError.textContent = msg;
        uploadError.classList.remove("hidden");
      }
      function hideUploadError() {
        uploadError.classList.add("hidden");
      }

      fileInput.addEventListener("change", (e) => setFile(e.target.files[0]));
      dropzone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropzone.classList.add("border-slate-400", "bg-slate-50");
      });
      dropzone.addEventListener("dragleave", () =>
        dropzone.classList.remove("border-slate-400", "bg-slate-50"),
      );
      dropzone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropzone.classList.remove("border-slate-400", "bg-slate-50");
        setFile(e.dataTransfer.files[0]);
      });

      btnExtraer.addEventListener("click", async () => {
        if (!selectedFile) return;
        toggleExtraer(true);
        hideUploadError();
        try {
          const fd = new FormData();
          fd.append("archivo", selectedFile);
          const res = await fetch(API + "/api/extraer", {
            method: "POST",
            body: fd,
          });
          const respuesta = await res.json();
          if (!res.ok) throw new Error(respuesta.error || "Error al extraer.");
          editor.value = JSON.stringify(respuesta.datos, null, 2);
          mostrarUsoTokens(respuesta.uso);
          stepEdit.classList.remove("hidden");
          stepEdit.scrollIntoView({ behavior: "smooth" });
          await refreshPreview();
        } catch (err) {
          showUploadError(err.message);
        } finally {
          toggleExtraer(false);
        }
      });

      function mostrarUsoTokens(uso) {
        if (!uso) return;
        const box = document.getElementById("token-usage");
        const fmt = (n) => n.toLocaleString("es-CO");
        document.getElementById("token-usage-text").textContent =
          uso.modelo +
          " · " +
          fmt(uso.tokensEntrada) +
          " entrada + " +
          fmt(uso.tokensSalida) +
          " salida = " +
          fmt(uso.tokensTotal) +
          " tokens totales · ~$" +
          uso.costoEstimadoUsd.toFixed(4) +
          " USD";
        box.classList.remove("hidden");
      }

      function toggleExtraer(loading) {
        btnExtraer.disabled = loading;
        document.getElementById("extraer-label").textContent = loading
          ? "Extrayendo..."
          : "Extraer datos con IA";
        document
          .getElementById("extraer-spinner")
          .classList.toggle("hidden", !loading);
      }

      function parseEditor() {
        try {
          const data = JSON.parse(editor.value);
          jsonError.classList.add("hidden");
          return data;
        } catch (e) {
          jsonError.textContent = "JSON inválido: " + e.message;
          jsonError.classList.remove("hidden");
          return null;
        }
      }

      async function refreshPreview() {
        const data = parseEditor();
        if (!data) return;
        const res = await fetch(API + "/api/preview", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data),
        });
        const html = await res.text();
        previewFrame.srcdoc = html;
        stepPreview.classList.remove("hidden");
        // escala el iframe (1288px de ancho real) para que quepa en el contenedor
        const scale = previewFrame.clientWidth / 1288;
        previewFrame.onload = () => {
          try {
            const doc = previewFrame.contentDocument;
            doc.body.style.transform = "scale(" + scale + ")";
            doc.body.style.transformOrigin = "top left";
            doc.body.style.width = "1288px";
          } catch (e) {}
        };
      }

      btnPreview.addEventListener("click", refreshPreview);

      btnPdf.addEventListener("click", async () => {
        const data = parseEditor();
        if (!data) return;
        togglePdf(true);
        try {
          const res = await fetch(API + "/api/pdf", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error || "Error al generar el PDF.");
          }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download =
            "Resumen_Epica_" +
            (data.periodo || "mes").replace(/[^a-zA-Z0-9]/g, "_") +
            ".pdf";
          a.click();
          URL.revokeObjectURL(url);
        } catch (err) {
          jsonError.textContent = err.message;
          jsonError.classList.remove("hidden");
        } finally {
          togglePdf(false);
        }
      });

      function togglePdf(loading) {
        btnPdf.disabled = loading;
        document.getElementById("pdf-label").textContent = loading
          ? "Generando..."
          : "Descargar PDF";
        document
          .getElementById("pdf-spinner")
          .classList.toggle("hidden", !loading);
      }
    </script>
  </body>
</html>
